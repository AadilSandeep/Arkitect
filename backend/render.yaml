# render.yaml — Render Blueprint specification
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: arkitect-api
    runtime: python
    plan: starter  # $7/mo — 512MB RAM
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_ENABLED
        value: true
      - key: CORS_ORIGINS
        value: '["https://your-app.vercel.app"]'  # Update with your Vercel URL
      - key: PYTHON_VERSION
        value: "3.12"
